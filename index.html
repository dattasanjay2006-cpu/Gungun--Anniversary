<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary Gungun</title>
<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#startScreen{
  text-align:center;
}

button{
  padding:15px 35px;
  font-size:22px;
  border:none;
  border-radius:40px;
  background:#ff4b6e;
  color:white;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

#envelopeSection{
  display:none;
  text-align:center;
  animation:fadeIn 1.5s;
}

.envelope{
  width:320px;
  height:200px;
  background:#fff;
  margin:auto;
  position:relative;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.flap{
  position:absolute;
  width:0;
  height:0;
  border-left:160px solid transparent;
  border-right:160px solid transparent;
  border-bottom:110px solid #ff6b81;
  top:-110px;
  left:0;
  transform-origin:bottom;
  transition:1s;
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

.letter{
  position:absolute;
  width:90%;
  height:160px;
  background:#fff0f3;
  top:20px;
  left:5%;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:20px;
  transform:translateY(40px);
  opacity:0;
  transition:1s;
}

.envelope.open .letter{
  transform:translateY(-120px);
  opacity:1;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

h1{
  color:#ff2e63;
  margin-bottom:5px;
}

p{
  padding:0 15px;
  text-align:center;
}

.hearts{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
}

.heart{
  position:absolute;
  color:red;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}
</style>
</head>
<body>

<div id="startScreen">
<h1>For My Love ❤️</h1>
<button onclick="openSite()">Open</button>
</div>

<div id="envelopeSection">
<div class="envelope" id="env">
<div class="flap"></div>
<div class="letter">
<h1>Happy Anniversary</h1>
<h2>Gungun ❤️</h2>
<p>You make my life brighter every single day. I'm lucky to have you.</p>
</div>
</div>
<br>
<button onclick="openEnvelope()">Open Envelope</button>
</div>

<div class="hearts" id="hearts"></div>

<script>
function openSite(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("envelopeSection").style.display="block";
}

function openEnvelope(){
  document.getElementById("env").classList.add("open");
}

function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"%";
  heart.style.fontSize=(Math.random()*20+20)+"px";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.getElementById("hearts").appendChild(heart);

  setTimeout(()=>{heart.remove()},6000);
}

setInterval(createHeart,500);
</script>

</body>
</html>
